<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="RAYD8® is the world's first digital scalar-inspired visual resonance system designed to elevate your state physically, mentally, and energetically in minutes."
    />
    <link rel="preload" as="image" href="/hero/RAYD8-Premium.png" fetchpriority="high" />
    <title>RAYD8® - The Med Bed Alternative System for Your Home.</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const websiteId = import.meta.env.VITE_UMAMI_WEBSITE_ID?.trim()
      const baseUrl = import.meta.env.VITE_UMAMI_BASE_URL?.trim() || 'https://cloud.umami.is'
      const scriptUrl =
        import.meta.env.VITE_UMAMI_SCRIPT_URL?.trim() ||
        `${baseUrl.replace(/\/+$/, '').replace(/\/api$/, '')}/script.js`

      if (websiteId && !document.querySelector('script[data-r8-umami="true"]')) {
        const injectUmami = () => {
          if (document.querySelector('script[data-r8-umami="true"]')) {
            return
          }
          const script = document.createElement('script')
          script.async = true
          script.defer = true
          script.src = scriptUrl
          script.setAttribute('data-website-id', websiteId)
          script.setAttribute('data-r8-umami', 'true')
          document.head.appendChild(script)
        }

        const scheduleUmami = () => {
          if ('requestIdleCallback' in window) {
            window.requestIdleCallback(injectUmami, { timeout: 4000 })
          } else {
            window.setTimeout(injectUmami, 1500)
          }
        }

        if (document.readyState === 'complete') {
          scheduleUmami()
        } else {
          window.addEventListener('load', scheduleUmami, { once: true })
        }
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
